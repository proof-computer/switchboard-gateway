server {
  listen 3443 ssl;
  server_name _;

  ssl_certificate /etc/nginx/certs/tls.crt;
  ssl_certificate_key /etc/nginx/certs/tls.key;

  location = /.well-known/proofcomputer/challenge {
    default_type application/json;
    add_header Cache-Control "no-store";
    return 200 '{"sessionId":"local-tls-test","nonce":"$arg_nonce","deploymentId":"operator-host-test","timestamp":$msec}';
  }

  location / {
    default_type text/plain;
    return 200 "switchboard tls test upstream\n";
  }
}
